<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassin & Zouhair Beauty</title>
    
    <style>
        /* --- CSS التصميم --- */
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --whatsapp-green: #25d366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--black);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        /* اللوغو وتنسيق الأسماء */
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            border-bottom: 2px solid var(--gold);
        }

        .logo h1 {
            margin: 0;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .logo span {
            color: #fff;
            font-size: 1.5rem;
        }

        .logo p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: #888;
        }

        /* الواجهة الرئيسية */
        .hero {
            padding: 60px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* شبكة المنتجات */
        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 50px 10%;
        }

        .product-card {
            background: #151515;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.3s ease;
        }

        .product-card:hover {
            border-color: var(--gold);
            transform: translateY(-10px);
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-card h3 {
            margin: 15px 0 10px;
            font-size: 1.4rem;
        }

        .price {
            color: var(--gold);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* زر الواتساب المباشر */
        .buy-btn {
            display: block;
            background-color: var(--whatsapp-green);
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .buy-btn:hover {
            background-color: #1ebe57;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        footer {
            padding: 30px;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>ياسين <span>&</span> زهير</h1>
            <p>Y&Z BEAUTY</p>
        </div>
    </header>

    <section class="hero">
        <h2>ارتقِ بجمالك للأفضل</h2>
        <p>مجموعة فاخرة مختارة بعناية</p>
    </section>

    <div class="products-container">
        
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=400&q=80" alt="عطر">
            <h3>عطر العود الملكي</h3>
            <p class="price">450 درهم</p>
            <a href="https://wa.me/212600000000?text=السلام عليكم، أريد طلب: عطر العود الملكي" class="buy-btn">
                شراء عبر واتساب مباشرة
            </a>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?auto=format&fit=crop&w=400&q=80" alt="كريم">
            <h3>كريم تفتيح البشرة</h3>
            <p class="price">290 درهم</p>
            <a href="https://wa.me/212657822894?text=السلام عليكم، أريد طلب: كريم تفتيح البشرة" class="buy-btn">
                شراء عبر واتساب مباشرة
            </a>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1527633546944-8232f9d3a6ad?auto=format&fit=crop&w=400&q=80" alt="زيت">
            <h3>مجموعة زيوت الشعر</h3>
            <p class="price">320 درهم</p>
            <a href="https://wa.me/212657822894?text=السلام عليكم، أريد طلب: مجموعة زيوت الشعر" class="buy-btn">
                شراء عبر واتساب مباشرة
            </a>
        </div>

    </div>

    <footer style="text-align: center;">
        <p>© 2026 Yassin & Zouhair Beauty. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
